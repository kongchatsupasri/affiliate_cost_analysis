<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Affiliate Profit Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{--bg:#111;--surface:#1a1a1a;--border:#2a2a2a;--text:#e5e5e5;--muted:#888;--shopee:#f97316;--tiktok:#a78bfa;--lazada:#38bdf8}
    body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;margin:0;padding:2rem}
    .container{max-width:900px;margin:0 auto}
    .card{background:var(--surface);border:1px solid var(--border);padding:1.5rem;border-radius:12px;margin-bottom:1.5rem}
    .btn{background:#fff;color:#000;border:none;padding:0.8rem 1.5rem;border-radius:8px;font-weight:700;cursor:pointer;width:100%}
    .btn:disabled{opacity:0.5}
    table{width:100%;border-collapse:collapse;margin-top:1rem}
    th,td{padding:0.8rem;border-bottom:1px solid var(--border);text-align:left}
    .status{color:var(--muted);font-size:0.9rem;margin-top:1rem}
    pre{white-space:pre-wrap;word-wrap:break-word;background:#000;padding:1rem;border-radius:8px;line-height:1.6}
  </style>
</head>
<body>
  <div class="container">
    <h1>Profit Analyzer (Affiliate Focused)</h1>
    <p style="color:var(--muted)">วิเคราะห์รูรั่วกำไรจากค่า Affiliate โดย AI</p>
    
    <div class="card">
      <h3>อัปโหลดไฟล์รายงาน (Excel)</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin:1rem 0">
        <div><label>Shopee (Income)</label><input type="file" id="file-shopee" multiple accept=".xlsx"></div>
        <div><label>TikTok</label><input type="file" id="file-tiktok" multiple accept=".xlsx"></div>
        <div><label>Lazada</label><input type="file" id="file-lazada" multiple accept=".xlsx"></div>
      </div>
      <button id="btn-run" class="btn" onclick="run()">วิเคราะห์แม่งเลย</button>
      <div id="status" class="status"></div>
    </div>

    <div id="output-card" class="card" style="display:none">
      <h3>ผลการวิเคราะห์ข้อมูล</h3>
      <div id="output-text"></div>
    </div>
  </div>

  <script>
    // Logic การจัดการวันที่เหมือนใน Python (Grouping by Week)
    function getWeekStart(dateStr) {
        const date = new Date(dateStr);
        if (isNaN(date)) return "Unknown";
        const day = date.getDay(), diff = date.getDate() - day + (day == 0 ? -6 : 1);
        return new Date(date.setDate(diff)).toISOString().split('T')[0];
    }

    async function parseExcel(file, config) {
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data);
        const sheet = workbook.Sheets[config.sheetName || workbook.SheetNames[0]];
        if (!sheet) return [];
        const rawJson = XLSX.utils.sheet_to_json(sheet, { range: config.skipRows || 0 });
        
        // กรองเฉพาะ Column ที่จำเป็นเหมือนใน Python
        return rawJson.map(row => ({
            week_start: getWeekStart(row[config.colDate]),
            sale: parseFloat(row[config.colSale] || 0),
            affiliate: parseFloat(row[config.colAff] || 0)
        }));
    }

    async function run() {
        const btn = document.getElementById('btn-run');
        const status = document.getElementById('status');
        const outputCard = document.getElementById('output-card');
        const outputText = document.getElementById('output-text');
        
        btn.disabled = true;
        status.innerText = "กำลังประมวลผลไฟล์...";

        try {
            const dataPayload = {};
            
            // Shopee: Skip 5, Sheet Income
            const shopeeFiles = document.getElementById('file-shopee').files;
            if (shopeeFiles.length) {
                dataPayload.shopee = await Promise.all([...shopeeFiles].map(f => 
                    parseExcel(f, { skipRows: 5, sheetName: 'Income', colDate: 'วันที่ทำการสั่งซื้อ', colSale: 'สินค้าราคาปกติ', colAff: 'ค่าคอมมิชชั่น AMS' })
                ));
            }

            // TikTok
            const tiktokFiles = document.getElementById('file-tiktok').files;
            if (tiktokFiles.length) {
                dataPayload.tiktok = await Promise.all([...tiktokFiles].map(f => 
                    parseExcel(f, { colDate: 'Time', colSale: 'Original Price', colAff: 'Affiliate Commission' })
                ));
            }

            // Lazada
            const lazadaFiles = document.getElementById('file-lazada').files;
            if (lazadaFiles.length) {
                dataPayload.lazada = await Promise.all([...lazadaFiles].map(f => 
                    parseExcel(f, { colDate: 'Order Date', colSale: 'Unit Price', colAff: 'Affiliate Fee' })
                ));
            }

            status.innerText = "AI กำลังคิดแม่งเลย... แป๊บเดียวพี่";
            const response = await fetch('/.netlify/functions/analyze', {
                method: 'POST',
                body: JSON.stringify({ data: dataPayload })
            });

            const result = await response.json();
            outputCard.style.display = 'block';
            outputText.innerHTML = `<pre>${result.analysis}</pre>`;
            status.innerText = "วิเคราะห์เสร็จแล้วพี่!";
        } catch (err) {
            status.innerText = "Error: " + err.message;
        } finally {
            btn.disabled = false;
        }
    }
  </script>
</body>
</html>
